    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 Philo-Mémo — Fiches de Révision Bac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f5f0;
            --card: #ffffff;
            --text: #2d2a26;
            --text-light: #6b6560;
            --accent: #c45c3e;
            --accent-light: #e8a87c;
            --accent2: #4a6fa5;
            --accent2-light: #7ba3d1;
            --green: #5a8f7b;
            --green-light: #8fc1ad;
            --purple: #7b5e8a;
            --purple-light: #b39bc8;
            --border: #e8e4de;
            --shadow: 0 4px 24px rgba(45,42,38,0.08);
            --shadow-hover: 0 12px 40px rgba(45,42,38,0.14);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            min-height: 100vh;
        }
        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, #2d2a26 0%, #4a4540 100%);
            color: #fff;
            padding: 40px 20px 50px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 60%;
            height: 200%;
            background: radial-gradient(circle, rgba(196,92,62,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -10%;
            width: 40%;
            height: 200%;
            background: radial-gradient(circle, rgba(74,111,165,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
        header h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        header .tagline {
            font-size: 1rem;
            opacity: 0.7;
            font-weight: 300;
            margin-bottom: 24px;
        }
        .search-wrap {
            position: relative;
            max-width: 420px;
            margin: 0 auto;
        }
        .search-wrap input {
            width: 100%;
            padding: 14px 48px 14px 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            outline: none;
            transition: all 0.3s;
        }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.45); }
        .search-wrap input:focus {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 0 3px rgba(196,92,62,0.3);
        }
        .search-wrap .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.5;
        }
        .progress-outer {
            max-width: 420px;
            margin: 20px auto 0;
        }
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            width: 0%;
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            border-radius: 2px;
        }
        .progress-text {
            font-size: 0.78rem;
            opacity: 0.55;
            margin-top: 8px;
            text-align: center;
        }
        /* ===== MAIN ===== */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 16px 60px;
        }
        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            margin: 30px 0 16px;
            font-weight: 600;
        }
        /* ===== NOTION CARD ===== */
        .notion-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .notion-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }
        .notion-card.opened {
            border-color: var(--accent);
            box-shadow: 0 4px 24px rgba(196,92,62,0.1);
        }
        .notion-card.opened .notion-header {
            background: linear-gradient(135deg, rgba(196,92,62,0.06), rgba(232,168,124,0.04));
        }
        .notion-header {
            display: flex;
            align-items: center;
            padding: 18px 22px;
            gap: 14px;
            transition: background 0.3s;
        }
        .notion-num {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            color: #fff;
        }
        .notion-num.n1 { background: var(--accent); }
        .notion-num.n2 { background: var(--accent2); }
        .notion-num.n3 { background: var(--green); }
        .notion-num.n4 { background: var(--purple); }
        .notion-num.n5 { background: #c4a35e; }
        .notion-num.n6 { background: #5e7a8a; }
        .notion-info { flex: 1; min-width: 0; }
        .notion-title {
            font-family: 'Crimson Pro', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }
        .notion-preview {
            font-size: 0.82rem;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .notion-arrow {
            font-size: 1.2rem;
            color: var(--text-light);
            transition: transform 0.3s;
            flex-shrink: 0;
        }
        .notion-card.opened .notion-arrow { transform: rotate(180deg); color: var(--accent); }
        .notion-body {
            display: none;
            padding: 0 22px 24px;
            animation: fadeIn 0.4s ease;
        }
        .notion-card.opened .notion-body { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ===== DEFINITION ===== */
        .def-block {
            background: linear-gradient(135deg, #faf8f5, #f5f2ec);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-bottom: 18px;
            border-left: 3px solid var(--accent);
        }
        .def-block h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 700;
        }
        .def-block p {
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 6px;
            padding-left: 14px;
            position: relative;
        }
        .def-block p::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--accent-light);
            font-weight: bold;
        }
        .def-block p:last-child { margin-bottom: 0; }
        /* ===== PHILOSOPHES ===== */
        .philos-block { margin-bottom: 18px; }
        .philos-block h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent2);
            margin-bottom: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .philos-block h4::before {
            content: '';
            width: 20px;
            height: 2px;
            background: var(--accent2);
            border-radius: 1px;
        }
        .philos-flow {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .philos-step {
            position: relative;
            padding-left: 32px;
            padding-bottom: 20px;
        }
        .philos-step:last-child { padding-bottom: 0; }
        .philos-step::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 6px;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--border), transparent);
        }
        .philos-step:last-child::before { bottom: auto; height: 6px; }
        .philos-step::after {
            content: attr(data-step);
            position: absolute;
            left: 0;
            top: 0;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--card);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-light);
            z-index: 1;
        }
        .philos-step.active::after {
            border-color: var(--accent);
            color: var(--accent);
            background: #fff5f2;
        }
        .philos-name {
            font-family: 'Crimson Pro', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }
        .philos-work {
            font-size: 0.78rem;
            color: var(--text-light);
            font-style: italic;
            margin-bottom: 8px;
        }
        .philos-quote {
            background: linear-gradient(135deg, #fef9f3, #fdf5ec);
            border-left: 3px solid var(--accent-light);
            padding: 12px 16px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin-bottom: 8px;
            position: relative;
        }
        .philos-quote::before {
            content: '"';
            position: absolute;
            top: -2px;
            left: 8px;
            font-family: 'Crimson Pro', serif;
            font-size: 2.2rem;
            color: var(--accent-light);
            opacity: 0.4;
            line-height: 1;
        }
        .philos-quote p {
            font-family: 'Crimson Pro', serif;
            font-size: 1rem;
            font-style: italic;
            color: #5a3a2a;
            padding-left: 20px;
            line-height: 1.5;
        }
        .philos-explain {
            font-size: 0.88rem;
            color: var(--text-light);
            padding-left: 4px;
            line-height: 1.7;
        }
        .philos-explain strong { color: var(--text); font-weight: 600; }
        .philos-explain em { color: var(--accent); font-style: normal; font-weight: 500; }
        /* ===== SYNTHESIS ===== */
        .synth-block {
            background: linear-gradient(135deg, #f0f7f4, #e8f2ed);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-top: 16px;
            border: 1px solid rgba(90,143,123,0.2);
        }
        .synth-block h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--green);
            margin-bottom: 10px;
            font-weight: 700;
        }
        .synth-block p {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.7;
        }
        .synth-block p strong { color: var(--green); }
        /* ===== EXEMPLES ===== */
        .ex-block {
            background: linear-gradient(135deg, #f5f0f7, #f0e8f5);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-top: 14px;
            border: 1px solid rgba(123,94,138,0.15);
        }
        .ex-block h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--purple);
            margin-bottom: 10px;
            font-weight: 700;
        }
        .ex-item {
            font-size: 0.88rem;
            color: var(--text);
            padding: 8px 0;
            border-bottom: 1px dashed rgba(123,94,138,0.15);
            line-height: 1.6;
        }
        .ex-item:last-child { border-bottom: none; padding-bottom: 0; }
        .ex-item strong { color: var(--purple); font-weight: 600; }
        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 30px 20px 40px;
            color: var(--text-light);
            font-size: 0.8rem;
        }
        footer span { color: var(--accent); }
        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            header { padding: 30px 16px 40px; }
            main { padding: 20px 12px 40px; }
            .notion-header { padding: 14px 16px; }
            .notion-body { padding: 0 16px 20px; }
            .notion-title { font-size: 1.15rem; }
            .philos-step { padding-left: 28px; }
            .philos-quote p { font-size: 0.95rem; }
        }
        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
    </style>
</head>

// === RENDER ===
const container = document.getElementById('notionsContainer');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
let consulted = new Set();

function renderNotions(arr) {
    container.innerHTML = '';
    arr.forEach(n => {
        const card = document.createElement('div');
        card.className = 'notion-card';
        card.setAttribute('data-id', n.id);
        card.innerHTML = `
            <div class="notion-header" onclick="toggleCard(${n.id})">
                <div class="notion-num ${n.color}">${n.id}</div>
                <div class="notion-info">
                    <div class="notion-title">${n.title}</div>
                    <div class="notion-preview">${n.preview}</div>
                </div>
                <div class="notion-arrow">▼</div>
            </div>
            <div class="notion-body">
                <div class="def-block">
                    <h4>📌 Définitions & Concepts clés</h4>
                    ${n.definitions.map(d => `<p>${d}</p>`).join('')}
                </div>
                <div class="philos-block">
                    <h4>🗣️ Philosophes — Du simple au complexe</h4>
                    <div class="philos-flow">
                        ${n.philosophes.map((p, i) => `
                            <div class="philos-step ${i === n.philosophes.length-1 ? 'active' : ''}" data-step="${p.step}">
                                <div class="philos-name">${p.name}</div>
                                <div class="philos-work">${p.work}</div>
                                <div class="philos-quote"><p>${p.quote}</p></div>
                                <div class="philos-explain">${p.explain}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="synth-block">
                    <h4>🧩 Synthèse</h4>
                    <p>${n.synthese}</p>
                </div>
                <div class="ex-block">
                    <h4>💡 Exemples pour la dissertation</h4>
                    ${n.exemples.map(e => `<div class="ex-item">${e}</div>`).join('')}
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

function toggleCard(id) {
    const card = document.querySelector(`.notion-card[data-id="${id}"]`);
    const isOpen = card.classList.contains('opened');
    // Close all
    document.querySelectorAll('.notion-card').forEach(c => c.classList.remove('opened'));
    // Open clicked if was closed
    if (!isOpen) {
        card.classList.add('opened');
        if (!consulted.has(id)) {
            consulted.add(id);
            updateProgress();
        }
        // Smooth scroll to card
        setTimeout(() => {
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    }
}

function updateProgress() {
    const pct = Math.round(consulted.size / notions.length * 100);
    progressFill.style.width = pct + '%';
    progressText.textContent = `${consulted.size} / ${notions.length} notions consultées`;
}

// Search
const searchBox = document.getElementById('searchBox');
searchBox.addEventListener('input', function() {
    const val = this.value.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    const filtered = notions.filter(n => {
        const text = (n.title + ' ' + n.preview + ' ' + n.philosophes.map(p => p.name).join(' ')).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
        return text.includes(val);
    });
    renderNotions(filtered);
});

// Init
renderNotions(notions);
updateProgress();
</script>
